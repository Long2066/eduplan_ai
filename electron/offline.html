<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EduPlan AI</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        color: #172033;
        background: #f4f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(520px, calc(100vw - 40px));
        padding: 28px;
        border: 1px solid #d8e0ec;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 18px 48px rgba(23, 32, 51, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 22px;
        line-height: 1.25;
      }

      p {
        margin: 0;
        color: #506070;
        font-size: 15px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Không mở được EduPlan AI</h1>
      <p>
        App desktop không kết nối được tới địa chỉ EduPlan AI. Kiểm tra kết nối mạng hoặc
        cấu hình EDUPLAN_APP_URL khi build bản phát hành.
      </p>
    </main>
  </body>
</html>
